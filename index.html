<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamãe F - Atacadão Farma Centro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Poppins', sans-serif; }

.hero {
    background: linear-gradient(135deg, #ec4899, #be185d);
}

.card {
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    border-radius: 24px;
}
</style>
</head>

<body class="bg-gray-50">

<!-- HEADER -->
<div class="hero text-white text-center py-10">
    <h1 class="text-4xl font-bold">🤰 Mamãe F</h1>
    <p class="mt-2 text-pink-100">Atacadão Farma Centro</p>
    <p class="mt-3 text-sm text-pink-100">Descubra sua fase e o que é comum na gestação 💖</p>
</div>

<!-- INPUT -->
<div class="max-w-md mx-auto px-6 -mt-10">

    <div class="bg-white p-6 rounded-3xl card">

        <label class="block font-semibold text-gray-600 mb-2">
            Data da última menstruação (DUM)
        </label>

        <input type="date" id="dum"
            class="w-full p-4 rounded-xl bg-gray-100 text-lg font-bold">

        <button onclick="calcular()"
            class="w-full mt-5 bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-2xl">
            CALCULAR GESTAÇÃO
        </button>

    </div>

    <!-- RESULTADO -->
    <div id="resultado" class="hidden bg-white p-6 rounded-3xl mt-6 card">

        <div class="text-center">
            <h2 class="text-5xl font-bold text-pink-600" id="semanas"></h2>
            <p class="text-gray-500 mt-1">semanas de gestação</p>

            <p class="mt-4 font-semibold text-gray-700" id="trimestre"></p>
            <p class="text-gray-500 mt-2" id="dpp"></p>
        </div>

        <!-- DICA -->
        <div class="mt-6 p-5 rounded-2xl bg-pink-50 border border-pink-100">
            <p class="font-bold text-pink-700">💖 O que é comum nessa fase:</p>
            <p id="dica" class="text-gray-700 mt-2"></p>
        </div>

        <!-- SINTOMAS -->
        <div class="mt-5 p-5 rounded-2xl bg-blue-50 border border-blue-100">
            <p class="font-bold text-blue-700">🤰 Sintomas normais dessa fase:</p>
            <p id="sintomas" class="text-gray-700 mt-2"></p>
            <p class="text-xs text-gray-500 mt-2">
                ✔ Isso é comum na gestação. Não precisa se preocupar.
            </p>
        </div>

        <!-- BOTÃO -->
        <button onclick="whats()"
            class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl">
            📲 Falar com a Farmácia
        </button>

        <p class="text-xs text-gray-400 mt-3 text-center">
            *Conteúdo educativo. Consulte sempre seu médico.
        </p>

    </div>
</div>

<script>

function calcular() {

    const dum = new Date(document.getElementById("dum").value);
    const hoje = new Date();

    if (!dum.getTime()) {
        alert("Selecione uma data válida");
        return;
    }

    const diff = hoje - dum;
    const dias = diff / (1000 * 60 * 60 * 24);
    const semanas = Math.floor(dias / 7);

    const parto = new Date(dum);
    parto.setDate(parto.getDate() + 280);

    let trimestre = "";
    let dica = "";
    let sintomas = "";

    if (semanas <= 12) {
        trimestre = "🌸 1º Trimestre";
        dica = "Ácido fólico e vitaminas pré-natais são os mais comuns nesta fase.";
        sintomas = "Enjoo, cansaço, sono excessivo, sensibilidade nos seios e alterações hormonais.";
    }

    else if (semanas <= 27) {
        trimestre = "🤰 2º Trimestre";
        dica = "Ferro, ômega 3 e hidratação da pele são bastante utilizados.";
        sintomas = "Melhora dos enjoos, aumento da energia, barriga crescendo e leve dor nas costas.";
    }

    else {
        trimestre = "🐣 3º Trimestre";
        dica = "Produtos para maternidade como fraldas, pomadas e cálcio são comuns.";
        sintomas = "Cansaço, inchaço nas pernas, falta de ar leve e contrações leves.";
    }

    document.getElementById("semanas").innerText = semanas;
    document.getElementById("trimestre").innerText = trimestre;
    document.getElementById("dpp").innerText =
        "Data provável do parto: " + parto.toLocaleDateString("pt-BR");

    document.getElementById("dica").innerText = dica;
    document.getElementById("sintomas").innerText = sintomas;

    document.getElementById("resultado").classList.remove("hidden");
}

function whats() {

    const numero = "5561992186067";

    const msg = encodeURIComponent(
        "Olá! Usei a calculadora Mamãe F e estou na minha fase de gestação. Quero saber mais sobre os produtos indicados para mim 💖"
    );

    window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
